<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Transcribe — Laptop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a; color: #fff;
      font-family: -apple-system, sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; gap: 24px; padding: 40px;
    }

    h1 { font-size: 24px; font-weight: 600; }
    p  { color: #888; font-size: 15px; text-align: center; max-width: 420px; line-height: 1.6; }

    #btn-start {
      background: #3b82f6; color: #fff;
      border: none; border-radius: 12px;
      padding: 14px 36px; font-size: 17px;
      cursor: pointer; transition: background 0.2s;
    }
    #btn-start:hover { background: #2563eb; }
    #btn-start:disabled { background: #333; color: #666; cursor: default; }

    #btn-stop {
      background: transparent; color: #f87171;
      border: 1px solid #f87171; border-radius: 12px;
      padding: 10px 28px; font-size: 15px;
      cursor: pointer; display: none;
    }
    #btn-stop:hover { background: rgba(248,113,113,0.1); }

    #status {
      font-size: 14px; padding: 8px 20px;
      border-radius: 20px; background: #1a1a1a;
      color: #888;
    }
    #status.live { background: #052e16; color: #4ade80; }
    #status.error { background: #2d1515; color: #f87171; }

    .phone-hint {
      margin-top: 8px;
      font-size: 13px; color: #555;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>AR Transcribe</h1>
  <p>Click Start, then pick the browser tab playing audio (YouTube, news, etc.). Transcription and translation will appear on your phone.</p>

  <div id="status">Idle</div>
  <button id="btn-start">▶ Start Capturing</button>
  <button id="btn-stop">■ Stop</button>
  <div class="phone-hint" id="phone-hint"></div>

  <script>
    const WS_URL   = `wss://${location.hostname}:${location.port}/ws/audio`;
    const SAMPLE_RATE = 16000;

    const btnStart  = document.getElementById('btn-start');
    const btnStop   = document.getElementById('btn-stop');
    const statusEl  = document.getElementById('status');
    const phoneHint = document.getElementById('phone-hint');

    let ws, audioCtx, processor, source, stream;

    phoneHint.textContent = `Phone URL: https://${location.hostname}:${location.port}/ar-transcribe/mobile.html`;

    function setStatus(text, cls = '') {
      statusEl.textContent = text;
      statusEl.className = cls;
    }

    btnStart.addEventListener('click', async () => {
      try {
        // Ask user to share a tab (audio only)
        stream = await navigator.mediaDevices.getDisplayMedia({
          video: true,   // required by some browsers even if we don't use it
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            sampleRate: SAMPLE_RATE,
          },
        });

        // If user picked a tab with no audio track, warn them
        const audioTracks = stream.getAudioTracks();
        if (audioTracks.length === 0) {
          setStatus('No audio track found — make sure to check "Share tab audio"', 'error');
          stream.getTracks().forEach(t => t.stop());
          return;
        }

        // Connect to server
        ws = new WebSocket(WS_URL);
        ws.binaryType = 'arraybuffer';

        ws.onopen = () => {
          setStatus('🔴 Live — capturing tab audio', 'live');
          btnStart.disabled = true;
          btnStop.style.display = 'inline-block';
          startAudioPipeline();
        };

        ws.onclose = () => {
          setStatus('Disconnected', '');
          stop();
        };

        ws.onerror = () => setStatus('WebSocket error', 'error');

      } catch (e) {
        if (e.name !== 'AbortError') setStatus('Error: ' + e.message, 'error');
      }
    });

    btnStop.addEventListener('click', stop);

    function startAudioPipeline() {
      audioCtx = new AudioContext({ sampleRate: SAMPLE_RATE });
      source = audioCtx.createMediaStreamSource(stream);

      // ScriptProcessor to get raw PCM chunks
      processor = audioCtx.createScriptProcessor(4096, 1, 1);
      processor.onaudioprocess = (e) => {
        if (ws.readyState !== WebSocket.OPEN) return;
        const float32 = e.inputBuffer.getChannelData(0);
        // Convert float32 → int16
        const int16 = new Int16Array(float32.length);
        for (let i = 0; i < float32.length; i++) {
          int16[i] = Math.max(-32768, Math.min(32767, float32[i] * 32767));
        }
        ws.send(int16.buffer);
      };

      source.connect(processor);
      processor.connect(audioCtx.destination);

      // Stop if user ends screen share
      stream.getVideoTracks()[0]?.addEventListener('ended', stop);
      stream.getAudioTracks()[0]?.addEventListener('ended', stop);
    }

    function stop() {
      processor?.disconnect();
      source?.disconnect();
      audioCtx?.close();
      stream?.getTracks().forEach(t => t.stop());
      ws?.close();
      btnStart.disabled = false;
      btnStop.style.display = 'none';
      setStatus('Stopped');
    }
  </script>
</body>
</html>
