<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AR RAG — Print Markers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, sans-serif;
      background: #ffffff;
      padding: 32px;
    }
    h1 { margin-bottom: 8px; }
    p { color: #555; margin-bottom: 32px; font-size: 15px; }
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }
    .card {
      background: #fff;
      border: 2px solid #ddd;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      width: 220px;
    }
    .card img {
      display: block;
      margin: 0 auto 12px;
      background: #fff;
      padding: 12px;
      border: 4px solid #000;
    }
    .card .label { font-size: 14px; color: #333; font-weight: bold; }
    .card .question { font-size: 12px; color: #888; margin-top: 6px; }
    @media print {
      body { padding: 8px; background: #fff; }
      h1, p, .print-btn { display: none; }
      .card { break-inside: avoid; border: 1px solid #ccc; }
    }
    .print-btn {
      margin-bottom: 24px;
      padding: 10px 24px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>AR Flashcard Markers</h1>
  <p>Print these markers or display on your phone. Hold each one up to the camera to reveal the flashcard.</p>
  <button class="print-btn" onclick="window.print()">🖨 Print All</button>
  <div class="grid" id="grid"></div>

  <script type="module">
    async function init() {
      const res = await fetch('cards.json');
      const cards = await res.json();
      const grid = document.getElementById('grid');

      for (let id = 0; id < 5; id++) {
        const card = cards[String(id)];
        if (!card) continue;

        const div = document.createElement('div');
        div.className = 'card';

        const img = document.createElement('img');
        img.src = `markers/qr_${id}.png`;
        img.width = 160;
        img.height = 160;
        img.style.display = 'block';
        img.style.margin = '0 auto 12px';

        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = `Card #${id}`;

        const question = document.createElement('div');
        question.className = 'question';
        question.textContent = card.question;

        div.appendChild(img);
        div.appendChild(label);
        div.appendChild(question);
        grid.appendChild(div);
      }
    }
    init();
  </script>
</body>
</html>
